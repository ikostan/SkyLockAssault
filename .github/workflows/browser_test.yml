---
name: "Browser Functional Tests"

on:  # yamllint disable-line rule:truthy
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        description: "Codecov requires a token to authenticate"
        required: true
    inputs:
      pw_timeout:
        description: "Playwright timeout in ms"
        required: false
        type: "number"
        default: 30000

jobs:
  test:
    runs-on: "ubuntu-latest"
    timeout-minutes: 25
    env:
      PW_TIMEOUT: "${{ inputs.pw_timeout }}"
    steps:
      - uses: "actions/checkout@v6.0.1"

      - name: "Disable Editor Plugins (Prevent Headless Crash)"
        run: |
          source .github/scripts/ci_utils.sh
          disable_editor_plugins "project.godot"

      - name: "Inject Test Salt into GDScript"
        env:
          PRODUCTION_SALT: "playwright_dummy_salt_123"
        run: |
          # Executes the Single Source of Truth script
          bash ./.github/scripts/inject_salt.sh "scripts/core/globals.gd"

      - name: "Inject 'ci' feature flag into export_presets.cfg"
        run: |
          python3 .github/scripts/inject_ci_flag.py

      - name: "Create Export Directories"
        run: |
          mkdir -p export/web_thread_off

      - name: "Export Godot to Web"
        id: "export"
        uses: "firebelley/godot-export@930577654862a320eef793f399ee911b4479efb9"
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz"
          relative_project_path: "./"
          relative_export_path: "./export/web_thread_off"
          archive_output: false
          cache: false
          verbose: true
          presets_to_export: "Web_thread_off"
          use_preset_export_path: true  # Move exports to the directory defined in export_presets.cfg

      - name: "Flatten Export Directory"
        run: |
          bash ./.github/scripts/flatten_export.sh "export/web_thread_off" "Web_thread_off"

      - name: "List Export Directory Contents"
        run: |
          ls -la export/web_thread_off

      - name: "Patch index.js for security"
        run: |
          bash ./.github/scripts/patch_index_js.sh "export/web_thread_off"

      - name: "Set up Python"
        uses: "actions/setup-python@v6"
        with:
          python-version: "3.12"

      - name: "Cache PIP Dependencies"
        uses: "actions/cache@v5"
        id: cache
        with:
          path: "~/.cache/pip"
          # FIX: Added '-v2' to invalidate the old corrupted cache
          key: ${{ runner.os }}-pip-v2-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-v2-

      - name: "Install Playwright"
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          pip install playwright pytest-playwright pytest-asyncio

      # NEW STEP: Extract the exact Playwright version to use as a cache key
      - name: "Get Playwright Version"
        id: playwright-version
        run: |
          # Robustly fetch the version directly from the Python package metadata
          # bypassing any fragile CLI string formatting
          echo "version=$(python -c \"from importlib.metadata import version; print(version('playwright'))\")" >> $GITHUB_OUTPUT

      - name: "Cache Playwright Browsers"
        uses: "actions/cache@v5"
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          # FIX: Cache key is now strictly tied to the Playwright CLI version
          key: ${{ runner.os }}-playwright-v2-${{ steps.playwright-version.outputs.version }}

      - name: "Install Playwright Browsers"
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
            playwright install --with-deps chromium

      - name: "Start Security-Isolated HTTP Server"
        run: |
            python3 -c "
            import http.server, socketserver, os
            class MyHandler(http.server.SimpleHTTPRequestHandler):
                def end_headers(self):
                    self.send_header('Cross-Origin-Opener-Policy', 'same-origin')
                    self.send_header('Cross-Origin-Embedder-Policy', 'require-corp')
                    self.send_header('Cache-Control', 'no-store, no-cache, must-revalidate')
                    super().end_headers()
            socketserver.TCPServer.allow_reuse_address = True
            with socketserver.TCPServer(('', 8080), MyHandler) as httpd:
                os.chdir('export/web_thread_off')
                print('🚀 Security-isolated server starting on port 8080...')
                httpd.serve_forever()
            " &
            sleep 5
            curl -I http://localhost:8080/index.html

      - name: "Wait For WEB Server Response"
        run: |
          for i in {1..20}; do
            if curl -f http://localhost:8080/index.html >/dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
          if [ $i -eq 20 ]; then exit 1; fi

      - name: "Run Tests"
        run: |
          PYTHONPATH="$PWD/tests:$PYTHONPATH" pytest tests/ -v --ignore=tests/refactor --ignore=tests/ci --junitxml=junit.xml -o junit_family=legacy

      - name: "List Coverage Reports"
        run: |
          ls -la v8_coverage_*.json || echo "No v8_coverage_*.json found"

      - name: "Set up Node.js for Coverage Conversion"
        uses: "actions/setup-node@v6"
        with:
          node-version: '20'  # Stable for Win10 compat

      - name: "Install Conversion Tools"
        # For conversion and report
        run: |
          npm install v8-to-istanbul nyc

      # yamllint disable rule:line-length
      - name: "Convert V8 to LCOV"
        run: |
          mkdir -p .nyc_output coverage/lcov
          counter=0
          for file in v8_coverage_*.json; do
            node -e "
            const fs = require('fs');
            const path = require('path');
            const V8ToIstanbul = require('v8-to-istanbul');
            // Read and parse coverage file
            const rawCoverage = JSON.parse(fs.readFileSync('$file', 'utf8'));
            // Extract array from result if present, else use directly
            const coverage = rawCoverage.result ? rawCoverage.result : rawCoverage;
            (async () => {
              let localCounter = 0;
              for (const entry of coverage) {
                if (!entry.functions || entry.functions.length === 0) {
                  console.log('Skipping entry without functions: ' + (entry.url || 'empty'));
                  continue;
                }
                const scriptPath = entry.url && entry.url.startsWith('http://localhost:8080/')
                  ? entry.url.replace('http://localhost:8080/', path.join(process.cwd(), 'export/web_thread_off/'))
                  : 'export/web_thread_off/index.js';  // Map anonymous to real file
                const options = entry.source ? { source: entry.source } : {};
                try {
                  const converter = new V8ToIstanbul(scriptPath, 0, options);
                  if (entry.url) await converter.load();  // Only load if real path
                  converter.applyCoverage(entry.functions);
                  const filename = path.basename(scriptPath) + '_' + (localCounter++) + '.json';
                  fs.writeFileSync(path.join('.nyc_output', filename), JSON.stringify(converter.toIstanbul()));
                  console.log('Converted entry for ' + file);
                } catch (e) {
                  console.error('Skipping entry ' + (entry.url || 'anonymous') + ': ' + e.message);
                }
              }
            })();
            "
            counter=$((counter + 1))
          done
          npx nyc report --reporter=lcov --report-dir coverage/lcov --all --include=export/web_thread_off/*.js  # Merge with --all for 0% on untested

      - name: "Upload LCOV Artifact"
        if: always()
        uses: "actions/upload-artifact@v7"
        with:
          name: lcov-report
          path: "./coverage/lcov/lcov.info"
          retention-days: 5

      - name: "Test Report"
        run: |
          if [ -f junit.xml ]; then
            total=$(xmllint --xpath 'count(//testcase)' junit.xml)
            failures=$(xmllint --xpath 'count(//testcase/failure)' junit.xml)
            errors=$(xmllint --xpath 'count(//testcase/error)' junit.xml)
            skipped=$(xmllint --xpath 'count(//testcase/skipped)' junit.xml)
            passed=$((total - failures - errors - skipped))
            echo "Test Report Summary:"
            echo "- Total tests: $total"
            echo "- Passed: $passed"
            echo "- Failed: $failures"
            echo "- Errors: $errors"
            echo "- Skipped: $skipped"
          else
            echo "No junit.xml found—tests may not have run."
          fi

      - name: "Upload Test Report Artifact"
        if: always()
        uses: "actions/upload-artifact@v7"
        with:
          name: test-report
          path: junit.xml

      - name: "Upload Screenshot and Coverage Artifacts"
        if: always()
        uses: "actions/upload-artifact@v7"
        with:
          name: test-screenshots
          path: |
            main_menu.png
            coverage_*.json

      - name: "Upload Coverage to Codecov"
        if: ${{ !cancelled() }}
        uses: "codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2"
        with:
          files: ./coverage/lcov/lcov.info
          flags: playwright
          fail_ci_if_error: false  # Non-blocking on 0%
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: export/web_thread_off

      - name: "Install Codecov CLI"
        if: success()
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov

      - name: "Upload Test Report to Codecov"
        if: success()
        run: |
          REPORT_FILE="./junit.xml"
          if [ -f "$REPORT_FILE" ]; then
            ./codecov upload-process --token ${{ secrets.CODECOV_TOKEN }} -f "$REPORT_FILE" --name "Playwright Browser Test Report" --flag PLAYWRIGHT --report-type test_results
          else
            echo "No Playwright JUnit XML found, skipping upload."
          fi
  # yamllint enable rule:line-length
