---
name: "GUT Unit Tests"

on:
  workflow_call:
    inputs:
      godot_version:
        type: string
        default: "4.6.3-stable"
      godot_sha256:
        type: string
        default: "d0bc2113065e481c9c2c2b2c37daa4e8be3fe9e27f0ab9ab0b6096e9a37907f3"
    secrets:
      CODECOV_TOKEN:
        description: "Codecov requires a token to authenticate"
        required: true

jobs:
  unit-test:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      checks: write
    env:
      GODOT_VERSION: ${{ inputs.godot_version }}
      GODOT_SHA256: ${{ inputs.godot_sha256 }}
    steps:
      - uses: "actions/checkout@v7"
      - name: "Download and Verify Godot Binary"
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip

          echo "${GODOT_SHA256}  Godot_v${GODOT_VERSION}_linux.x86_64.zip" | sha256sum --check --status
          if [ $? -ne 0 ]; then
            echo "❌ CRITICAL: Godot binary verification failed! Checksum mismatch."
            exit 1
          fi

          unzip Godot_v${GODOT_VERSION}_linux.x86_64.zip
          mv Godot_v${GODOT_VERSION}_linux.x86_64 godot
          chmod +x godot
      - name: "Install GUT"
        run: |
          mkdir -p addons
          wget https://github.com/bitwes/Gut/archive/refs/tags/v9.5.0.zip
          unzip v9.5.0.zip -d addons
          mv addons/Gut-9.5.0/addons/gut addons/gut

      - name: "Clean Cache"
        run: |
          rm -rf .godot/

      - name: "Initialize Project and UIDs"
        run: |
          timeout 30s ./godot --headless --audio-driver Dummy --editor --path . || true
      - name: "Run GUT Tests"
        continue-on-error: false  # Explicit no continue on error (default, but for clarity).
        run: |
          REPORT_DIR="gut-reports/$(date +%Y%m%d_%H%M%S)"
          mkdir -p $REPORT_DIR
          ./godot --headless --verbose --path . -s addons/gut/gut_cmdln.gd -gconfig=res://.gutconfig.json -gjunit_xml_file=$REPORT_DIR/gut_junit.xml -gexit
      - name: "Find Latest Report Directory"
        if: always()
        id: find_report
        run: |
          LATEST_REPORT=$(ls -td gut-reports/* | head -1 || echo "")
          if [ -z "$LATEST_REPORT" ]; then
            echo "No report directory found; tests may not have generated reports."
            exit 1
          fi
          echo "latest_report=$LATEST_REPORT" >> $GITHUB_OUTPUT  # Set output.
      - name: "List Reports"
        if: always()
        run: |
          ls -la ${{ steps.find_report.outputs.latest_report }}/
      - name: "Upload Test Reports Artifacts"
        if: always()
        uses: "actions/upload-artifact@v7"
        with:
          name: gut-reports
          path: gut-reports/**
          retention-days: 5
      - name: "Install Codecov CLI"
        if: success()  # Only if tests pass.
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
      - name: "Upload Test Report to Codecov"
        if: success()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          REPORT_FILE="${{ steps.find_report.outputs.latest_report }}/gut_junit.xml"
          if [ -f "$REPORT_FILE" ]; then
            ./codecov upload-process --token ${{ secrets.CODECOV_TOKEN }} -f "$REPORT_FILE" --name "GUT Test Report" --flag GUT --report-type test_results
          else
            echo "No GUT JUnit XML found, skipping upload."
          fi
