name: "CodeQL Scan on Web Export"

on:  # yamllint disable-line rule:truthy
  # Makes it reusable; called by other workflows
  workflow_call:  # yamllint disable rule:empty-values

jobs:
  export-and-scan:
    runs-on: "ubuntu-latest"
    # Adding 'timeout-minutes: 10' would prevent jobs from running
    # indefinitely if something goes wrong
    timeout-minutes: 10
    permissions:
      actions: "read"
      contents: "read"
      # Needed to upload SARIF results
      security-events: "write"
    strategy:
      fail-fast: false
      matrix:
        # Limit to JS for export/web files
        language: ["javascript"]

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v4" # Standard stable v4
        with:
          # This explicitly tells the runner to use the branch that triggered the workflow
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: "Create Export Directories"
        run: |
          mkdir -p export/web

      - name: "Export Godot to Web"
        id: "export"
        # yamllint disable rule:line-length
        uses: "firebelley/godot-export@930577654862a320eef793f399ee911b4479efb9"  # Kept your specific SHA pin
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip" 
          godot_export_templates_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz" 
          relative_project_path: "./" 
          relative_export_path: "./export/web" 
          archive_output: false 
          verbose: true
          cache: true 
          presets_to_export: "Web"
          use_preset_export_path: true 

      - name: "Flatten Export Directory"
        run: |
          bash ./.github/scripts/flatten_export.sh "export/web" "Web"

      - name: "List files in export/web (for visibility)"
        run: |
          echo "Files to be scanned in export/web:"
          ls -R export/web || echo "No files found—check if folder exists!"

      - name: "Patch index.js for security"
        run: |
          bash ./.github/scripts/patch_index_js.sh "export/web"

      - name: "Initialize CodeQL"
        # Using the stable v4 tag to avoid SHA-propagation issues
        uses: "github/codeql-action/init@v4"
        with:
          languages: ${{ matrix.language }}
          config-file: ".github/codeql-config.yml"
          dependency-caching: "true"
          debug: "false"

      - name: "Autobuild (optional for JS but included for completeness)"
        uses: "github/codeql-action/autobuild@v4"

      - name: "Perform CodeQL Analysis"
        uses: "github/codeql-action/analyze@v4"

      - name: "Post-scan summary (optional)"
        if: "always()"
        run: |
          if [ -n "$(find . -name '*.sarif')" ]; then
            echo "Scan complete—results uploaded."
          else
            echo "Scan complete—no results found."
          fi
