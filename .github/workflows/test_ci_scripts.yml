---
name: "CI/CD Infrastructure Tests"

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      godot_version:
        description: "The Godot version string passed from the calling pipeline"
        type: string
        required: true

jobs:
  test-python:
    name: "Run CI Injection Tests"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v7"

      - name: "Set up Python"
        uses: "actions/setup-python@v6"
        with:
          python-version: "3.12"

      - name: "Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install pytest playwright

      - name: "Run CI Injection Tests"
        run: |
          pytest tests/ci/ -v -s

  verify-godot:
    name: "Test Godot Asset Infrastructure and Signature Verification"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10  # Generous timeout to download the 1.2 GB template file
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v7"

      - name: "Test Godot Asset Infrastructure and Signature Verification"
        run: |
          chmod +x .github/scripts/verify_godot.sh
          bash .github/scripts/verify_godot.sh "${{ inputs.godot_version }}"
