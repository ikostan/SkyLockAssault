---
name: "Deploy to itch.io"

on:  # yamllint disable-line rule:truthy
  workflow_call:  # Reusable
    inputs:
      version:
        description: "The version to inject (e.g., v0.6.1)"
        type: string
        required: true
      godot_version:
        description: "The Godot version string passed from the calling pipeline"
        type: string
        default: "4.6.3-stable"
        required: true
    secrets:
      ITCHIO_API_KEY:
        description: "Itch.io API key"
        required: true
      PRODUCTION_SALT:
        description: "production salt secret key"
        required: true

env:
  BUTLER_VERSION: "15.27.0"
  BUTLER_SHA256: "b9f0d6eef33036031cafaf59939d9f3bc724e2b674c510d4a9cf8a9f1008e299"
  GODOT_VERSION: "4.6.3-stable"

jobs:
  export-and-deploy:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v6.0.1"

      - name: "Inject Version into project.godot"
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          ESCAPED_VERSION=$(printf '%s' "$VERSION" | sed 's/[\\\\/&]/\\\\&/g')
          if grep -q '^config/version="' project.godot; then
            sed -i "s/^config\/version=\".*\"$/config\/version=\"$ESCAPED_VERSION\"/g" project.godot
          elif grep -q '^\[application\]' project.godot; then
            sed -i "/^\[application\]/a config\/version=\"$ESCAPED_VERSION\"" project.godot
          else
            printf '\n[application]\nconfig/version="%s"\n' "$ESCAPED_VERSION" >> project.godot
          fi

      - name: "Disable Editor Plugins (Prevent Headless Crash)"
        run: |
          set -euo pipefail
          source .github/scripts/ci_utils.sh
          disable_editor_plugins "project.godot"

      - name: "Inject Production Salt into GDScript"
        env:
          PRODUCTION_SALT: ${{ secrets.PRODUCTION_SALT }}
        run: |
          set -euo pipefail
          bash ./.github/scripts/inject_salt.sh "scripts/core/globals.gd"

      - name: "Create Export Directories"
        run: |
          set -euo pipefail
          mkdir -p export/web

      - name: "Download and Verify Godot Binaries"
        run: |
          set -euo pipefail
          
          # Execute your standalone test script directly
          bash ./.github/scripts/verify_godot.sh "${{ inputs.godot_version }}"

          # Step inside the created directory context to launch the engine asset pipe
          cd godot_binaries

          echo "✅ Integrity check passed. Starting local HTTP server..."
          nohup python3 -m http.server 8000 > /dev/null 2>&1 &

          echo "⏳ Waiting for local HTTP server to spin up..."
          TIMEOUT=20
          while ! curl -s http://localhost:8000/ > /dev/null; do
            if [ $TIMEOUT -le 0 ]; then
              echo "❌ FATAL: Local HTTP server failed to start within timeout window."
              exit 1
            fi
            sleep 0.5
            TIMEOUT=$((TIMEOUT - 1))
          done

          echo "🚀 Local HTTP server is responsive and ready."

      - name: "Export Godot to Web"
        id: "export"
        uses: "firebelley/godot-export@615a6f7afc22d6266bf55c17748fb07447e8bdab"
        with:
          godot_executable_download_url: "http://localhost:8000/Godot_v"${{ inputs.godot_version }}"_linux.x86_64.zip"
          godot_export_templates_download_url: "http://localhost:8000/Godot_v"${{ inputs.godot_version }}"_export_templates.tpz"
          relative_project_path: "./"
          relative_export_path: "./export/web"
          archive_output: true
          verbose: true
          cache: false
          presets_to_export: "Web"
          use_preset_export_path: true

      - name: "Unzip Export Archive"
        run: |
          set -euo pipefail
          ARCHIVE_DIR="${{ steps.export.outputs.archive_directory }}"

          # Defensive guard: prevent rm -rf from acting on an empty or malformed path
          if [ -z "$ARCHIVE_DIR" ] || [ "$ARCHIVE_DIR" = "/" ] || [ "$ARCHIVE_DIR" = "." ]; then
            echo "❌ FATAL: archive_directory output is empty or unsafe."
            exit 1
          fi
          # Defensive hygiene: ensure clean staging directory before unzipping
          rm -rf "$ARCHIVE_DIR/patched_build"
          mkdir -p "$ARCHIVE_DIR/patched_build"
          unzip "$ARCHIVE_DIR/Web.zip" -d "$ARCHIVE_DIR/patched_build"

      - name: "Patch index.js for security"
        run: |
          set -euo pipefail
          bash ./.github/scripts/patch_index_js.sh "${{ steps.export.outputs.archive_directory }}/patched_build"

      - name: "Re-zip Flattened Export"
        run: |
          set -euo pipefail
          ARCHIVE_DIR="${{ steps.export.outputs.archive_directory }}"

          # Delete the original, unpatched zip
          rm "$ARCHIVE_DIR/Web.zip"

          # Zip the patched build back into the original location securely
          cd "$ARCHIVE_DIR/patched_build" && zip -r "$ARCHIVE_DIR/Web.zip" .

      - name: "Verify export does not contain placeholder"
        run: |
          set -euo pipefail

          # Temporarily disable pipefail to prevent SIGPIPE from failing the check
          # if grep exits early upon finding a match in the unpacked byte stream.
          set +o pipefail

          if unzip -p "${{ steps.export.outputs.archive_directory }}/Web.zip" | grep -qF "CI_INJECT_SALT_HERE"; then
            echo "❌ Placeholder detected inside final export archive."
            exit 1
          fi

          # Immediately restore strict pipefail for any future commands added to this block
          set -o pipefail

          echo "✅ Final export archive verified successfully."

      - name: "Cache Butler"
        id: "cache-butler"
        uses: "actions/cache@v5"
        with:
          path: "butler"
          key: "Linux-butler-${{ env.BUTLER_VERSION }}-v1"

      - name: "Download Butler (On Cache Miss)"
        if: steps.cache-butler.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p butler
          curl -fL --show-error -o butler.zip "https://broth.itch.zone/butler/linux-amd64/${{ env.BUTLER_VERSION }}/archive/default"

          # SECURITY CHECK: Verify binary integrity
          echo "${{ env.BUTLER_SHA256 }}  butler.zip" | sha256sum -c -

          unzip butler.zip -d butler
          rm butler.zip

      - name: "Setup Butler Execution Environment"
        run: |
          set -euo pipefail
          chmod +x butler/butler
          # Verify version block before placing on path
          ./butler/butler --version
          echo "$(pwd)/butler" >> "$GITHUB_PATH"

      - name: "Deploy to itch.io with Butler"
        run: |
          set -euo pipefail
          butler push "${{ steps.export.outputs.archive_directory }}/Web.zip" ikostan/sky-lock-assault:${{ github.ref_name }} --userversion "${{ inputs.version }}"
        env:
          BUTLER_API_KEY: "${{ secrets.ITCHIO_API_KEY }}"
