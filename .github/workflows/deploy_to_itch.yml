---
name: "Deploy to itch.io"

on:  # yamllint disable-line rule:truthy
  workflow_call:  # Reusable
    inputs:
      version:
        description: "The version to inject (e.g., v0.6.1)"
        type: string
        required: true
    secrets:
      ITCHIO_API_KEY:
        description: "Itch.io API key"
        required: true
      PRODUCTION_SALT:
        description: "production salt secret key"
        required: true

jobs:
  export-and-deploy:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v6.0.1"

      - name: "Inject Version into project.godot"
        run: |
          VERSION="${{ inputs.version }}"
          ESCAPED_VERSION=$(printf '%s' "$VERSION" | sed 's/[\\\\/&]/\\\\&/g')
          if grep -q '^config/version="' project.godot; then
            sed -i "s/^config\/version=\".*\"$/config\/version=\"$ESCAPED_VERSION\"/g" project.godot
          elif grep -q '^\[application\]' project.godot; then
            sed -i "/^\[application\]/a config\/version=\"$ESCAPED_VERSION\"" project.godot
          else
            printf '\n[application]\nconfig/version="%s"\n' "$ESCAPED_VERSION" >> project.godot
          fi

      - name: "Disable Editor Plugins (Prevent Headless Crash)"
        run: |
          source .github/scripts/ci_utils.sh
          disable_editor_plugins "project.godot"

      - name: "Inject Production Salt into GDScript"
        env:
          PRODUCTION_SALT: ${{ secrets.PRODUCTION_SALT }}
        run: bash ./.github/scripts/inject_salt.sh "scripts/core/globals.gd"

      - name: "Create Export Directories"
        run: mkdir -p export/web

      - name: "Export Godot to Web"
        id: "export"
        uses: "firebelley/godot-export@930577654862a320eef793f399ee911b4479efb9"
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz"
          relative_project_path: "./"
          relative_export_path: "./export/web"
          archive_output: true
          verbose: true
          cache: false  # disable the export cache so Godot is forced to recompile the freshly injected GDScript
          presets_to_export: "Web"
          use_preset_export_path: true

      - name: "Unzip Export Archive"
        # Extract into a clean, separate folder so we don't mix the zip with the raw files
        run: unzip ${{ steps.export.outputs.archive_directory }}/Web.zip -d export/patched_build

      - name: "Patch index.js for security"
        run: bash ./.github/scripts/patch_index_js.sh "export/patched_build"

      - name: "Re-zip Flattened Export"
        run: |
          # 1. Delete the original, unpatched zip
          rm ${{ steps.export.outputs.archive_directory }}/Web.zip
          # 2. Go into our patched folder
          cd export/patched_build
          # 3. Zip the files directly back into the original output variable's location
          zip -r ../../${{ steps.export.outputs.archive_directory }}/Web.zip .
          cd ../..

      - name: "Cache Butler"
        id: "cache-butler"
        uses: "actions/cache@v5"
        with:
          path: "butler"
          key: "${{ runner.os }}-butler-15.24.0-v2"

      - name: "Setup Butler"
        run: |
          chmod +x butler/butler
          echo "$(pwd)/butler" >> $GITHUB_PATH

      - name: "Deploy to itch.io with Butler"
        run: |
          # The bot is happy because we use the dynamic variable, and we are happy 
          # because we mathematically guarantee this is the patched, un-bloated zip!
          butler push ${{ steps.export.outputs.archive_directory }}/Web.zip ikostan/sky-lock-assault:${{ github.ref_name }} --userversion "${{ inputs.version }}"
        env:
          BUTLER_API_KEY: "${{ secrets.ITCHIO_API_KEY }}"
