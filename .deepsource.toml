version = 1

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3"
  # Path to your Playwright tests
  test_patterns = ["tests/**/*.py", "**/test_*.py"]

[[analyzers]]
name = "javascript"
enabled = true

[[analyzers]]
name = "html"
enabled = true

[[transformers]]
name = "black"
enabled = true

[[transformers]]
name = "isort"
enabled = true