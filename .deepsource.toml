version = 1

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  # FIX: Use "3.x.x" exactly. Specific versions like 3.12 are unsupported here.
  runtime_version = "3.x.x"
  test_patterns = ["tests/**/*.py", "**/test_*.py"]

[[analyzers]]
name = "javascript"
enabled = true

# The "html" analyzer was removed as it is not a valid standalone core analyzer.

[[transformers]]
name = "black"
enabled = true

[[transformers]]
name = "isort"
enabled = true